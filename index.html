<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <div class="header-top">
                <h1>Todo</h1>
                <span class="date" id="dateDisplay"></span>
            </div>
            <p class="subtitle">Stay organized, stay productive</p>
        </header>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="What needs to be done?" autocomplete="off" />
            <button id="addTaskBtn" title="Add task">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
            </button>
        </div>

        <div class="stats">
            <span id="taskCount">0 items left</span>
            <button id="clearCompletedBtn">Clear completed</button>
        </div>

        <ul id="taskList"></ul>

        <div class="empty-state" id="emptyState">
            <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/>
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
                <line x1="9" y1="12" x2="15" y2="12"/>
                <line x1="9" y1="16" x2="13" y2="16"/>
            </svg>
            <p class="empty-title">No tasks yet</p>
            <span class="empty-sub">Add a task above to get started</span>
        </div>
    </div>

    <script src="todo.js"></script>
</body>
</html>
